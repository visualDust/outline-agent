# Optional user-scoped configuration for `~/.outline-agent/config.yaml`.
# Environment variables and CLI flags can still override individual fields at runtime.

server:
  host: 127.0.0.1
  port: 8787

outline:
  api_base_url: ""
  api_key: ""
  webhook_signing_secret: ""

trigger:
  mode: mention
  mention_aliases:
    - "@agent"

model:
  ref: null
  timeout_seconds: 180

model_profiles:
  default: demo/gpt-4.1-mini
  profiles:
    demo:
      provider: openai-responses
      base_url: https://your-gateway.example.com/openai/v1
      api_key: ""
      models:
        - gpt-4.1-mini

prompts:
  system_prompt_packs:
    - outline_style

features:
  memory_actions: true
  memory_updates: true
  document_updates: true
  tool_use: true
  thread_sessions: true
  reactions: true
  related_documents: true
  progress_comments: true

runtime:
  dry_run: false
  # Planning loop limits: up to 10 planning/execution rounds.
  # The planner may propose up to 6 steps, but execution runs in 2-step chunks by default.
  tool_execution_max_rounds: 10
  tool_execution_max_steps: 6
  tool_execution_chunk_size: 2
  # Relative runtime paths resolve from this config file's directory.
  # workspace_root: data/agents

logging:
  level: DEBUG
  # file_path: logs/outline-agent.log
